<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sania ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    background:url('background.jpg') center center/cover no-repeat;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
}

.container{
    position:relative;
    z-index:10;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:25px;
}

.message{
    color:white;
    font-size:1.5rem;
    font-weight:600;
    line-height:1.7;
    text-shadow:
        0 0 10px #fff,
        0 0 20px #fff,
        0 0 30px #fff;
    opacity:0;
    transition:opacity 2s ease;
    max-width:700px;
}

.show{
    opacity:1;
}

.startScreen{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:20;
    background:rgba(0,0,0,0.45);
}

.startScreen h1{
    color:white;
    text-shadow:0 0 20px white;
    font-size:2rem;
    margin-bottom:20px;
}

button{
    padding:14px 30px;
    border:none;
    border-radius:50px;
    font-size:1rem;
    cursor:pointer;
    background:white;
    font-weight:bold;
}

.floating{
    position:absolute;
    font-size:28px;
    animation:floatUp linear infinite;
    opacity:0.9;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}

.final{
    font-size:1.8rem;
}

@media(max-width:768px){
    .message{
        font-size:1.2rem;
    }

    .final{
        font-size:1.4rem;
    }

    .startScreen h1{
        font-size:1.6rem;
    }
}
</style>
</head>

<body>

<div class="overlay"></div>

<audio id="bgMusic" src="music.mp3"></audio>

<div id="floatingContainer"></div>

<div class="startScreen" id="startScreen">
    <h1>🌸 A Small Message For Sania 💖</h1>
    <button onclick="startExperience()">Start ❤️</button>
</div>

<div class="container">
    <div class="message" id="message"></div>
</div>

<script>

const messages = [

`Hi Sania 💖`,

`🌙 I know today hasn't been the easiest day for you...`,

`🥀 I don't know exactly what's on your mind right now...<br><br>and honestly, you don't have to explain everything.`,

`🧸 Sometimes even the strongest people get tired.<br><br>Sometimes the people who make everyone smile need a reason to smile too.`,

`❤️ So before anything else...<br><br>I just wanted to remind you of something.`,

`✨ You matter.<br><br>More than you realize.`,

`🌹 You are appreciated.<br>💐 You are important.<br>🧿 You are stronger than you think.<br>🌈 You deserve happiness too.`,

`💖 Whatever is bothering you today...<br><br>I hope it becomes lighter.<br><br>And I hope tomorrow is a little kinder to you.`,

`🌟 If something is hurting your heart right now...<br><br>I hope time treats it gently.`,

`❤️ This page won't magically solve everything...<br><br>But if it made you smile even for a few seconds...<br><br>then it has done its job.`,

`🌸 Take care of yourself, Sania.<br><br>The world is better with you in it. ✨<br><br>❤️🧸🌹💐🧿`
];

let current = 0;
const messageEl = document.getElementById("message");
const music = document.getElementById("bgMusic");

function startExperience(){

    document.getElementById("startScreen").style.display="none";

    music.volume = 1;
    music.play();

    showMessage();

    setInterval(createEmoji,700);
}

function showMessage(){

    if(current >= messages.length){

        fadeOutMusic();
        return;
    }

    messageEl.classList.remove("show");

    setTimeout(()=>{

        messageEl.innerHTML = messages[current];

        if(current === messages.length-1){
            messageEl.classList.add("final");
        }

        messageEl.classList.add("show");

        current++;

    },1000);

    setTimeout(showMessage,4000);
}

function createEmoji(){

    const emojis = ["❤️","🧸","🌹","💐","🧿","✨","🌸","💖"];

    const emoji = document.createElement("div");

    emoji.className = "floating";

    emoji.innerHTML =
        emojis[Math.floor(Math.random()*emojis.length)];

    emoji.style.left = Math.random()*100 + "vw";

    emoji.style.animationDuration =
        (6 + Math.random()*5) + "s";

    document.getElementById("floatingContainer")
        .appendChild(emoji);

    setTimeout(()=>{
        emoji.remove();
    },11000);
}

function fadeOutMusic(){

    let fade = setInterval(()=>{

        if(music.volume > 0.05){
            music.volume -= 0.05;
        }else{
            music.pause();
            clearInterval(fade);
        }

    },300);
}

</script>

</body>
</html>
